name: Build DoorNet2 Firmware

on:
  push:
    branches:
      - codex/doornet2-firmware
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo docker image prune -af || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-setuptools rsync \
            swig unzip zlib1g-dev file wget curl python3 python3-pip ccache \
            cmake ninja-build gettext xsltproc qemu-utils

      - name: Prepare feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/doornet2-apply-feed-patches.sh

      - name: Prepare config
        run: |
          make defconfig

      - name: Download sources
        run: |
          make download -j8 || true
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        run: |
          make -j"$(nproc)" V=s

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doornet2-firmware
          path: |
            bin/targets/rockchip/armv8/*.img.gz
            bin/targets/rockchip/armv8/*.manifest
            bin/targets/rockchip/armv8/sha256sums
            bin/targets/rockchip/armv8/profiles.json
