name: Build DoorNet2 Firmware

on:
  push:
    branches:
      - codex/doornet2-firmware
  workflow_dispatch:

concurrency:
  group: doornet2-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show environment
        run: |
          pwd
          df -h
          nproc

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo docker image prune -af || true
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-setuptools rsync \
            swig unzip zlib1g-dev file wget curl python3 python3-pip ccache \
            cmake ninja-build xsltproc qemu-utils

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: dl
          key: ${{ runner.os }}-doornet2-dl-${{ hashFiles('feeds.conf.default', 'scripts/doornet2-apply-feed-patches.sh', 'scripts/patches/*', 'config/doornet2_github.seed') }}
          restore-keys: |
            ${{ runner.os }}-doornet2-dl-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-doornet2-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-doornet2-ccache-

      - name: Prepare feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/doornet2-apply-feed-patches.sh

      - name: Prepare config
        run: |
          cp config/doornet2_github.seed .config
          make defconfig

      - name: Download sources
        run: |
          make download -j"$(nproc)" || true
          find dl -size -1024c -exec rm -f {} \;

      - name: Build firmware
        env:
          CCACHE_DIR: ${{ github.workspace }}/.ccache
        run: |
          make -j"$(nproc)" V=s

      - name: List artifacts
        if: always()
        run: |
          find bin/targets/rockchip/armv8 -maxdepth 1 -type f | sort || true

      - name: Upload firmware artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doornet2-firmware-${{ github.sha }}
          path: |
            bin/targets/rockchip/armv8/*.img.gz
            bin/targets/rockchip/armv8/*.manifest
            bin/targets/rockchip/armv8/sha256sums
            bin/targets/rockchip/armv8/profiles.json
            bin/targets/rockchip/armv8/*.buildinfo
          if-no-files-found: error
